name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm build
        env:
          VITE_EJS_SERVICE_ID: service_avwk5yc
          VITE_EJS_TEMPLATE_ID: template_ujmv7q7
          VITE_EJS_HIRE_TEMPLATE_ID: template_8g6rckz
          VITE_EJS_PUBLIC_KEY: lxGImJMZYEIssOPOm
      - run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
